<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SPR HRIS - PT. Selancar Panen Raya</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: #0D0F14;
  color: #E2E8F0;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== CSS VARIABLES ===== */
:root {
  --primary: #F5A623;
  --primary-dark: #D4881A;
  --primary-glow: rgba(245,166,35,0.25);
  --primary-subtle: rgba(245,166,35,0.08);
  --bg: #0D0F14;
  --bg-card: #151820;
  --bg-elevated: #1C2030;
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.15);
  --text: #E2E8F0;
  --text-muted: #64748B;
  --text-secondary: #94A3B8;
  --green: #22C55E;
  --green-bg: rgba(34,197,94,0.12);
  --red: #EF4444;
  --red-bg: rgba(239,68,68,0.12);
  --yellow: #F59E0B;
  --yellow-bg: rgba(245,158,11,0.12);
  --blue: #3B82F6;
  --blue-bg: rgba(59,130,246,0.12);
  --sidebar-w: 268px;
  --topbar-h: 60px;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.35);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

/* ===== TOAST ===== */
.toast-container { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none; width: min(360px, calc(100vw - 32px)); }
.toast {
  background: var(--bg-elevated);
  color: var(--text);
  padding: 12px 20px;
  border-radius: 40px;
  font-size: 13px;
  font-weight: 600;
  border: 1px solid var(--border-strong);
  box-shadow: var(--shadow);
  animation: slideUp 0.3s ease;
  width: 100%;
  text-align: center;
  pointer-events: all;
}
.toast.success { border-color: var(--green); color: var(--green); }
.toast.error { border-color: var(--red); color: var(--red); }
.toast.info { border-color: var(--blue); color: var(--blue); }
@keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

/* ===== LOGIN SCREEN ===== */
#login-screen {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 30% 20%, rgba(245,166,35,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 80%, rgba(59,130,246,0.05) 0%, transparent 50%),
              var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
  transition: opacity 0.4s ease, visibility 0.4s ease;
}
#login-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

.login-wrapper { width: 100%; padding: 16px; display: flex; flex-direction: column; align-items: center; }

.login-logo {
  width: 72px; height: 72px; border-radius: 20px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; margin-bottom: 20px;
  box-shadow: 0 8px 32px var(--primary-glow);
}
.login-title { font-size: 26px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
.login-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 32px; }

.login-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 28px 24px;
  width: 100%;
  max-width: 380px;
  box-shadow: var(--shadow);
}

.input-group { position: relative; margin-bottom: 14px; }
.input-group .input-icon {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  font-size: 16px; pointer-events: none;
}
.input-group input {
  width: 100%; padding: 14px 16px 14px 44px;
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); font-size: 14px;
  font-family: inherit; transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}
.input-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
.input-group input::placeholder { color: var(--text-muted); }

.btn-login {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #0D0F14; font-size: 15px; font-weight: 700;
  border: none; border-radius: var(--radius-sm); cursor: pointer;
  font-family: inherit; transition: opacity 0.2s, transform 0.1s;
  margin-top: 4px;
}
.btn-login:hover { opacity: 0.92; }
.btn-login:active { transform: scale(0.98); }

.login-hint {
  margin-top: 20px; text-align: center; font-size: 12px; color: var(--text-muted);
  padding: 12px 16px; background: var(--bg-elevated);
  border-radius: var(--radius-sm); border: 1px solid var(--border); line-height: 1.6;
}

/* ===== APP SHELL ===== */
#app { display: none; min-height: 100dvh; }
#app.visible { display: block; }

/* ===== SIDEBAR ===== */
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: var(--sidebar-w);
  background: var(--bg-card);
  border-right: 1px solid var(--border);
  transform: translateX(-100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  z-index: 1000;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar.open { transform: translateX(0); box-shadow: 16px 0 48px rgba(0,0,0,0.4); }

.sidebar-header {
  padding: 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.brand {
  display: flex; align-items: center; gap: 12px;
}
.brand-icon {
  width: 40px; height: 40px; border-radius: 12px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.brand-name { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.3; }
.brand-sub { font-size: 11px; color: var(--text-muted); }

.user-card {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.user-avatar {
  width: 44px; height: 44px; border-radius: 14px;
  background: var(--primary-subtle); border: 1px solid var(--primary-glow);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; margin-bottom: 10px;
}
.user-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.user-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 600; padding: 3px 8px;
  border-radius: 20px; background: var(--primary-subtle); color: var(--primary);
}

.nav-section { padding: 12px 12px 0; flex: 1; overflow-y: auto; }
.nav-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; padding: 8px 8px 4px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 12px; border-radius: var(--radius-xs);
  color: var(--text-secondary); cursor: pointer;
  transition: background 0.15s, color 0.15s;
  font-size: 14px; font-weight: 500; margin-bottom: 2px;
}
.nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
.nav-item.active { background: var(--primary-subtle); color: var(--primary); font-weight: 600; }
.nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }

.sidebar-footer {
  padding: 16px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.btn-logout {
  display: flex; align-items: center; gap: 8px; justify-content: center;
  width: 100%; padding: 11px; border-radius: var(--radius-xs);
  background: var(--red-bg); color: var(--red);
  border: 1px solid rgba(239,68,68,0.2); cursor: pointer;
  font-size: 13px; font-weight: 600; font-family: inherit;
  transition: opacity 0.2s;
}
.btn-logout:hover { opacity: 0.8; }

/* ===== MOBILE OVERLAY ===== */
.mobile-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); z-index: 999;
  backdrop-filter: blur(2px);
}
.mobile-overlay.open { display: block; }

/* ===== MAIN CONTENT ===== */
.main { min-height: 100dvh; display: flex; flex-direction: column; }

.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13,15,20,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  height: var(--topbar-h);
  display: flex; align-items: center; padding: 0 16px; gap: 12px;
}
.hamburger {
  background: var(--bg-elevated); border: 1px solid var(--border);
  width: 38px; height: 38px; border-radius: var(--radius-xs);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text); font-size: 18px;
  transition: background 0.2s; flex-shrink: 0;
}
.hamburger:hover { background: var(--bg-card); }
.topbar-title { font-size: 16px; font-weight: 700; flex: 1; }
.topbar-clock {
  font-size: 12px; font-weight: 600; color: var(--text-muted);
  background: var(--bg-elevated); border: 1px solid var(--border);
  padding: 6px 12px; border-radius: 20px; white-space: nowrap;
}

/* ===== PAGE CONTENT ===== */
.content { flex: 1; padding: 16px; padding-bottom: 32px; }
.page { display: none; animation: fadeIn 0.2s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

/* ===== PAGE HEADER ===== */
.page-header { margin-bottom: 20px; }
.page-header h1 { font-size: 22px; font-weight: 800; margin-bottom: 2px; }
.page-header p { font-size: 13px; color: var(--text-muted); }

/* ===== STAT CARDS ===== */
.stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
  position: relative; overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 2px; background: linear-gradient(90deg, var(--primary), transparent);
}
.stat-icon { font-size: 24px; margin-bottom: 10px; }
.stat-value { font-size: 28px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
.stat-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
.stat-card.green::before { background: linear-gradient(90deg, var(--green), transparent); }
.stat-card.blue::before { background: linear-gradient(90deg, var(--blue), transparent); }
.stat-card.yellow::before { background: linear-gradient(90deg, var(--yellow), transparent); }

/* ===== CARDS ===== */
.card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 16px; overflow: hidden;
}
.card-header {
  padding: 16px 20px; font-size: 15px; font-weight: 700;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
}
.card-header-title { display: flex; align-items: center; gap: 8px; }
.card-body { padding: 16px 20px; }

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 16px; border-radius: 40px;
  font-size: 13px; font-weight: 600; border: none; cursor: pointer;
  font-family: inherit; transition: opacity 0.2s, transform 0.1s;
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #0D0F14; }
.btn-secondary { background: var(--bg-elevated); color: var(--text); border: 1px solid var(--border); }
.btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
.btn-success { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn:hover { opacity: 0.85; }
.btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

/* ===== TABLES ===== */
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 500px; }
th {
  padding: 10px 12px; text-align: left;
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--text-muted);
  background: var(--bg-elevated); border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }
td:first-child, th:first-child { padding-left: 20px; }
td:last-child, th:last-child { padding-right: 20px; }

/* ===== BADGES ===== */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
}
.badge-success { background: var(--green-bg); color: var(--green); }
.badge-warning { background: var(--yellow-bg); color: var(--yellow); }
.badge-danger { background: var(--red-bg); color: var(--red); }
.badge-info { background: var(--blue-bg); color: var(--blue); }
.badge-primary { background: var(--primary-subtle); color: var(--primary); }

/* ===== FORMS ===== */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { margin-bottom: 14px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 11px 14px;
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: var(--radius-xs); color: var(--text); font-size: 14px;
  font-family: inherit; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow);
}
.form-group select { cursor: pointer; }
.form-group textarea { resize: vertical; min-height: 80px; }
.form-group select option { background: var(--bg-card); }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 2000; visibility: hidden; opacity: 0;
  transition: all 0.25s ease;
}
.modal-overlay.open { visibility: visible; opacity: 1; }
.modal {
  background: var(--bg-card); border-radius: 24px 24px 0 0;
  width: 100%; max-width: 500px; border: 1px solid var(--border);
  border-bottom: none; box-shadow: var(--shadow);
  transform: translateY(20px); transition: transform 0.25s ease;
  max-height: 90dvh; display: flex; flex-direction: column;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle {
  width: 40px; height: 4px; border-radius: 2px;
  background: var(--border-strong); margin: 12px auto 0; flex-shrink: 0;
}
.modal-header {
  padding: 16px 20px; font-size: 16px; font-weight: 700;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.modal-body { padding: 20px; overflow-y: auto; flex: 1; }
.modal-footer {
  padding: 16px 20px; border-top: 1px solid var(--border);
  display: flex; gap: 10px; flex-shrink: 0;
}
.modal-footer .btn { flex: 1; justify-content: center; }

/* ===== ABSENSI STATUS BUTTONS ===== */
.absensi-item {
  padding: 14px 0; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  flex-wrap: wrap;
}
.absensi-item:last-child { border-bottom: none; }
.absensi-info { flex: 1; min-width: 0; }
.absensi-name { font-weight: 700; font-size: 14px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.absensi-sub { font-size: 12px; color: var(--text-muted); }
.absensi-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
.btn-absensi {
  padding: 7px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
  border: 1px solid var(--border); background: var(--bg-elevated);
  color: var(--text-secondary); cursor: pointer; font-family: inherit;
  transition: all 0.15s; white-space: nowrap;
}
.btn-absensi.active-hadir { background: var(--green-bg); color: var(--green); border-color: rgba(34,197,94,0.3); }
.btn-absensi.active-izin { background: var(--blue-bg); color: var(--blue); border-color: rgba(59,130,246,0.3); }
.btn-absensi.active-sakit { background: var(--yellow-bg); color: var(--yellow); border-color: rgba(245,158,11,0.3); }
.btn-absensi.active-alpha { background: var(--red-bg); color: var(--red); border-color: rgba(239,68,68,0.3); }

/* ===== SHIFT CARD ===== */
.shift-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0; border-bottom: 1px solid var(--border);
}
.shift-item:last-child { border-bottom: none; }
.shift-time { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center; padding: 40px 20px; color: var(--text-muted);
}
.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
.empty-state p { font-size: 14px; }

/* ===== CHART CONTAINER ===== */
.chart-container { position: relative; height: 220px; }

/* ===== DATE INPUT ===== */
.date-selector {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: var(--radius-xs); padding: 8px 14px; margin-bottom: 16px;
}
.date-selector label { font-size: 12px; color: var(--text-muted); font-weight: 600; }
.date-selector input {
  background: none; border: none; color: var(--primary);
  font-size: 14px; font-weight: 700; cursor: pointer; outline: none;
  font-family: inherit;
}

/* ===== DIVIDER ===== */
.divider { height: 1px; background: var(--border); margin: 16px 0; }

/* ===== PROGRESS BAR ===== */
.progress { background: var(--bg-elevated); border-radius: 4px; height: 6px; overflow: hidden; }
.progress-bar { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--primary), var(--primary-dark)); transition: width 0.4s; }

/* ===== DESKTOP ===== */
@media (min-width: 768px) {
  .sidebar { transform: translateX(0); }
  .hamburger { display: none; }
  .mobile-overlay { display: none !important; }
  .main { margin-left: var(--sidebar-w); }
  .stats-grid { grid-template-columns: repeat(4, 1fr); }
  .modal-overlay { align-items: center; }
  .modal { border-radius: 24px; border-bottom: 1px solid var(--border); max-height: 80vh; }
  .modal-handle { display: none; }
  .content { padding: 24px; }
  .form-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 767px) {
  .form-grid { grid-template-columns: 1fr; }
  .card-header { padding: 14px 16px; }
  .card-body { padding: 14px 16px; }
  th:first-child, td:first-child { padding-left: 14px; }
  th:last-child, td:last-child { padding-right: 14px; }
}

/* ===== SAFE AREA ===== */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  .content { padding-bottom: calc(24px + env(safe-area-inset-bottom)); }
  .sidebar-footer { padding-bottom: calc(16px + env(safe-area-inset-bottom)); }
}

/* ===== INPUT FILE HIDDEN ===== */
input[type="file"] { display: none !important; }

  /* ===== LOGO IMAGES ===== */
  .login-logo-img {
    width: 96px;
    height: 96px;
    object-fit: contain;
    margin-bottom: 16px;
    filter: drop-shadow(0 8px 24px rgba(245,166,35,0.35));
    animation: logoPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes logoPop {
    from { opacity:0; transform: scale(0.7); }
    to   { opacity:1; transform: scale(1); }
  }
  .brand-logo-img {
    width: 40px;
    height: 40px;
    object-fit: contain;
    border-radius: 10px;
    flex-shrink: 0;
    filter: drop-shadow(0 2px 6px rgba(245,166,35,0.3));
  }


  /* ===== AKSES PAGE ===== */
  .stat-grid-3 { grid-template-columns: repeat(3, 1fr) !important; }
  @media (max-width: 480px) {
    .stat-grid-3 { grid-template-columns: repeat(3, 1fr) !important; }
  }

</style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>
<div class="mobile-overlay" id="mobileOverlay" onclick="closeSidebar()"></div>

      <button id="confirmOkBtn" onclick="resolveConfirm(true)"

  </div>
</div>

// ======================== STORAGE — Supabase Cloud ========================
async function loadFromLocal() {
  if (!_sb || SUPABASE_URL === 'GANTI_DENGAN_SUPABASE_URL') {
    // Fallback ke localStorage bila belum dikonfigurasi
    try {
      var k=localStorage.getItem('spr_karyawan'), a=localStorage.getItem('spr_absensi'),
          i=localStorage.getItem('spr_izin'), l=localStorage.getItem('spr_lembur'), s=localStorage.getItem('spr_shift');
      if(k) karyawanList=JSON.parse(k);
      if(a) absensiList=JSON.parse(a);
      if(i) izinList=JSON.parse(i);
      if(l) lemburList=JSON.parse(l);
      if(s) shiftList=JSON.parse(s);
    } catch(e){}
    return;
  }
  showLoading('Memuat data dari server...');
  try {
    var res = await Promise.all([
      _sb.from('karyawan').select('*').order('id'),
      _sb.from('absensi').select('*').order('tanggal', {ascending:false}),
      _sb.from('izin').select('*').order('id', {ascending:false}),
      _sb.from('lembur').select('*').order('id', {ascending:false}),
      _sb.from('shift').select('*').order('id')
    ]);
    if(res[0].data) karyawanList = res[0].data;
    if(res[1].data) absensiList  = res[1].data;
    if(res[2].data) izinList     = res[2].data;
    if(res[3].data) lemburList   = res[3].data;
    if(res[4].data && res[4].data.length) shiftList = res[4].data;
    // fix field name mapping (snake_case DB -> camelCase app)
    karyawanList = karyawanList.map(mapKaryawan);
    absensiList  = absensiList.map(mapAbsensi);
    izinList     = izinList.map(mapIzin);
    lemburList   = lemburList.map(mapLembur);
  } catch(err) {
    console.error('loadFromLocal error', err);
    showToast('Gagal memuat data: ' + (err.message||''), 'error');
  }
  hideLoading();
}

async function dbUpsertKaryawan(k) {
  if (!_sb || SUPABASE_URL === 'GANTI_DENGAN_SUPABASE_URL') {
    try { localStorage.setItem('spr_karyawan', JSON.stringify(karyawanList)); } catch(e){}
    return;
  }
  var payload = {
    id: typeof k.id==='number' && k.id < 1e12 ? k.id : undefined,
    nik: k.nik, nama: k.nama, departemen: k.departemen,
    jabatan: k.jabatan, shift: k.shift, email: k.email,
    role: k.role, password: k.password, leader_id: k.leaderId||null
  };
  if (!payload.id) delete payload.id;
  var r = payload.id
    ? await _sb.from('karyawan').upsert(payload).select().single()
    : await _sb.from('karyawan').insert(payload).select().single();
  if (r.error) throw r.error;
  k.id = r.data.id;
}

let chart;
function getLeaderTeam() {
  // Returns employees directly under current leader (by leaderId or same dept if no leaderId assigned)
  if (currentUser.role === 'superadmin') return karyawanList.filter(k => k.role !== 'superadmin');
  if (currentUser.role === 'leader') {
    const byLeaderId = karyawanList.filter(k => k.leaderId === currentUser.id);
    if (byLeaderId.length > 0) return byLeaderId;
    // fallback: same department, not self, not other leaders/admins
    return karyawanList.filter(k => k.departemen === currentUser.departemen && k.id !== currentUser.id && k.role === 'karyawan');
  }
  return karyawanList.filter(k => k.id === currentUser.id);
}

function renderDashboard() {
  const isAdmin = currentUser.role === 'superadmin';
  const isLeader = currentUser.role === 'leader';
  const teamList = isAdmin || isLeader ? getLeaderTeam() : [];
  const total = isAdmin ? karyawanList.length : (isLeader ? teamList.length : 1);
  const today = todayStr();
  const hadirToday = isAdmin
    ? absensiList.filter(a => a.tanggal === today && a.status === 'Hadir').length
    : isLeader
    ? absensiList.filter(a => a.tanggal === today && a.status === 'Hadir' && teamList.some(k => k.id === a.karyawanId)).length
    : absensiList.filter(a => a.tanggal === today && a.status === 'Hadir' && a.karyawanId === currentUser.id).length;
  const izinPending = isAdmin ? izinList.filter(i => i.status === 'pending').length
    : isLeader ? izinList.filter(i => i.status === 'pending' && teamList.some(k => k.id === i.karyawanId)).length : 0;
  const lemburPending = isAdmin ? lemburList.filter(l => l.status === 'pending').length
    : isLeader ? lemburList.filter(l => l.status === 'pending' && teamList.some(k => k.id === l.karyawanId)).length : 0;

  const last7 = [...Array(7)].map((_, i) => {
    const d = new Date(); d.setDate(d.getDate() - 6 + i);
    return d.toISOString().split('T')[0];
  });
  const dataHadir = last7.map(tgl => {
    const base = absensiList.filter(a => a.tanggal === tgl && a.status === 'Hadir');

    if (isLeader) return base.filter(a => teamList.some(k => k.id === a.karyawanId)).length;
    return base.filter(a => a.karyawanId === currentUser.id).length;
  });

    const base = absensiList.filter(a => a.tanggal === tgl && a.status === 'Alpha');
    if (isAdmin) return base.length;
    if (isLeader) return base.filter(a => teamList.some(k => k.id === a.karyawanId)).length;
    return base.filter(a => a.karyawanId === currentUser.id).length;

  // Recent absensi - filtered by role
  const recentAbsensi = isAdmin

        <div class="stat-label">Lembur Pending</div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-header-title">📈 Kehadiran 7 Hari Terakhir</div>
      </div>
      <div class="card-body">
        <div class="chart-container"><canvas id="kehadiranChart"></canvas></div>
      </div>
    </div>
    ${recentAbsensi.length ? `
    <div class="card">
      <div class="card-header"><div class="card-header-title">📋 Absensi Hari Ini</div></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Karyawan</th><th>Status</th><th>Waktu</th></tr></thead>
          <tbody>
            ${recentAbsensi.map(a => {
              const k = karyawanList.find(k => k.id === a.karyawanId);
              const badgeMap = { Hadir: 'badge-success', Izin: 'badge-info', Sakit: 'badge-warning', Alpha: 'badge-danger' };
              return `<tr><td><strong>${k?.nama || '-'}</strong></td><td><span class="badge ${badgeMap[a.status] || ''}">${a.status}</span></td><td style="color:var(--text-muted)">${a.waktu || '-'}</td></tr>`;

async function setShiftKaryawan(karyawanId, shiftNama) {
  const idx = karyawanList.findIndex(k => k.id === karyawanId);
  if (idx !== -1) {
    karyawanList[idx].shift = shiftNama;
    try { await dbUpsertKaryawan(karyawanList[idx]); } catch(e) { showToast('Gagal simpan: '+e.message, 'error'); return; }
    showToast('Shift diperbarui', 'success');
  }
}

async function setAbsensiDrop(karyawanId, status) {
  if (!status) return;
  const today = todayStr();
  const idx = absensiList.findIndex(a => a.karyawanId === karyawanId && a.tanggal === today);
  const waktu = new Date().toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'});
  if (idx !== -1) { absensiList[idx].status = status; absensiList[idx].waktu = waktu; }
  else absensiList.push({ id: Date.now(), karyawanId, tanggal: today, status, waktu, diinputOleh: currentUser.nama });
  const aObj = absensiList.find(a => a.karyawanId === karyawanId && a.tanggal === today);
  try { await dbUpsertAbsensi(aObj); } catch(e) { showToast('Gagal simpan absensi: '+e.message, 'error'); }
  // Update visual tanpa re-render penuh agar tidak scroll
  const sel = document.getElementById('sel_' + karyawanId);
  if (sel) {
    const colorMap = { Hadir:'var(--green-bg)', Izin:'var(--blue-bg)', Sakit:'var(--yellow-bg)', Alpha:'var(--red-bg)' };
    const borderMap = { Hadir:'rgba(34,197,94,0.35)', Izin:'rgba(59,130,246,0.35)', Sakit:'rgba(245,158,11,0.35)', Alpha:'rgba(239,68,68,0.35)' };
    const textMap   = { Hadir:'var(--green)', Izin:'var(--blue)', Sakit:'var(--yellow)', Alpha:'var(--red)' };
    sel.style.background = colorMap[status] || 'var(--bg-elevated)';
    sel.style.borderColor = borderMap[status] || 'var(--border)';
    sel.style.color = textMap[status] || 'var(--text-muted)';
    // Update row background
    const row = sel.closest('div[style*="padding:13px"]');
    if (row) row.style.background = status === 'Hadir' ? 'rgba(34,197,94,0.06)' : 'rgba(239,68,68,0.04)';
    // Update arrow color
    const arrow = sel.nextElementSibling;
    if (arrow) arrow.style.color = textMap[status] || 'var(--text-muted)';
  }
  // Update counter badges quietly
  const today2 = todayStr();
  const allTarget = getLeaderTeam();
  const hC = allTarget.filter(k => { const a = absensiList.find(a => a.karyawanId === k.id && a.tanggal === today2); return a && a.status === 'Hadir'; }).length;
  const aEl = document.querySelector('[style*="border-radius:20px"][style*="border:1px solid var(--border)"]');
  if (aEl) aEl.textContent = hC + '/' + allTarget.length;
  showToast(status + ' dicatat', 'success');
}

async function hadirSemua() {
  const today = todayStr();
  const waktu = new Date().toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'});
  const target = getLeaderTeam();
  target.forEach(k => {
    const idx = absensiList.findIndex(a => a.karyawanId === k.id && a.tanggal === today);
    if (idx !== -1) { absensiList[idx].status = 'Hadir'; absensiList[idx].waktu = waktu; }
    else absensiList.push({ id: Date.now() + k.id, karyawanId: k.id, tanggal: today, status: 'Hadir', waktu, diinputOleh: currentUser.nama });
  });
  showLoading('Menyimpan absensi...');
  try {
    await Promise.all(target.map(k => {
      const a = absensiList.find(a => a.karyawanId === k.id && a.tanggal === today);
      return dbUpsertAbsensi(a);
    }));
  } catch(e) { showToast('Gagal simpan: '+e.message, 'error'); }
  hideLoading();
  renderAbsensi();
  showToast('Semua karyawan ditandai Hadir', 'success');
}

function setAbsensi(karyawanId, status) {
  setAbsensiDrop(karyawanId, status);
}

async function simpanKaryawan(id) {
  const nik = document.getElementById('fNik').value.trim();
  const nama = document.getElementById('fNama').value.trim();
  const dept = document.getElementById('fDept').value.trim();
  const jabatan = document.getElementById('fJabatan').value.trim();
  const shift = document.getElementById('fShift').value;
  const email = document.getElementById('fEmail').value.trim();
  const password = document.getElementById('fPassword').value.trim();
  const role = document.getElementById('fRole').value;
  const leaderIdRaw = document.getElementById('fLeaderId')?.value;
  const leaderId = leaderIdRaw ? parseInt(leaderIdRaw) : null;

  if (!nik || !nama) return showToast('NIK dan Nama wajib diisi', 'error');

  // Check duplicate NIK
  const dupNik = karyawanList.find(k => k.nik === nik && k.id !== id);
  if (dupNik) return showToast('NIK sudah digunakan', 'error');

  // Protect last superadmin
  if (id) {
    const existing = karyawanList.find(k => k.id === id);
    if (existing?.role === 'superadmin' && role !== 'superadmin' && karyawanList.filter(k => k.role === 'superadmin').length <= 1) {
      return showToast('Tidak dapat mengubah role satu-satunya HRD', 'error');
    }
  }

  let kObj;
  if (id) {
    const idx = karyawanList.findIndex(k => k.id === id);
    const oldK = karyawanList[idx];
    karyawanList[idx] = { ...oldK, nik, nama, departemen: dept, jabatan, shift, email, role, leaderId, ...(password ? { password } : {}) };
    kObj = karyawanList[idx];
  } else {
    if (!password) return showToast('Password wajib diisi untuk karyawan baru', 'error');
    kObj = { id: Date.now(), nik, nama, departemen: dept, jabatan, shift, email, role, leaderId, password };
    karyawanList.push(kObj);
  }

  showLoading('Menyimpan...');
  try {
    await dbUpsertKaryawan(kObj);
    hideLoading();
    closeKaryawanModal();
    renderKaryawan();
    showToast(id ? '✅ Data karyawan diperbarui' : '✅ Karyawan berhasil ditambahkan', 'success');
  } catch(e) {
    hideLoading();
    showToast('Gagal menyimpan: ' + e.message, 'error');
  }
}

function closeKaryawanModal() { document.getElementById('karyawanModal').classList.remove('open'); }

function hapusKaryawan(id) {
  const k = karyawanList.find(k => k.id === id);
  if (!k) return;
  if (k.role === 'superadmin' && karyawanList.filter(k => k.role === 'superadmin').length <= 1) {
    return showToast('Tidak dapat menghapus satu-satunya HRD', 'error');
  }
  showConfirm(`Hapus ${k.nama}? Semua data absensi dan izin akan ikut terhapus.`, 'Hapus Karyawan', '🗑️', 'Ya, Hapus').then(async ok => {
    if (!ok) return;
    showLoading('Menghapus...');
    try {
      await dbDeleteKaryawan(id);
      karyawanList = karyawanList.filter(x => x.id !== id);
      absensiList = absensiList.filter(a => a.karyawanId !== id);
      izinList = izinList.filter(i => i.karyawanId !== id);
      lemburList = lemburList.filter(l => l.karyawanId !== id);
      hideLoading();
      showToast('Karyawan dihapus', 'success');
      renderKaryawan();
    } catch(e) {
      hideLoading();
      showToast('Gagal hapus: ' + e.message, 'error');
    }
  });
}

// ======================== LAPORAN ========================
function renderLaporan(periodeType, periodeValue) {
  const pt = periodeType || 'bulanan';
  // Default values
  const today = todayStr();
  const thisMonth = today.substring(0,7); // YYYY-MM
  const thisWeekStart = (() => { const d = new Date(); d.setDate(d.getDate() - d.getDay() + 1); return d.toISOString().split('T')[0]; })();

  const pv = periodeValue || (pt === 'harian' ? today : pt === 'mingguan' ? thisWeekStart : thisMonth);

  // Get date range
  let dateFrom, dateTo;
  if (pt === 'harian') {
    dateFrom = dateTo = pv;
  } else if (pt === 'mingguan') {
    const start = new Date(pv);
    const end = new Date(start); end.setDate(start.getDate() + 6);
    dateFrom = start.toISOString().split('T')[0];
    dateTo   = end.toISOString().split('T')[0];
  } else {
    dateFrom = pv + '-01';
    const [y,m] = pv.split('-').map(Number);
    const lastDay = new Date(y, m, 0).getDate();
    dateTo = `${pv}-${String(lastDay).padStart(2,'0')}`;
  }

  let target = currentUser.role === 'superadmin' ? karyawanList
    : currentUser.role === 'leader' ? getLeaderTeam()
    : karyawanList.filter(k => k.id === currentUser.id);

  const inRange = (tgl) => tgl >= dateFrom && tgl <= dateTo;

  const rows = target.map(k => {
    const hadir = absensiList.filter(a => a.karyawanId === k.id && a.status === 'Hadir' && inRange(a.tanggal)).length;
    const izinSakit = absensiList.filter(a => a.karyawanId === k.id && (a.status === 'Izin' || a.status === 'Sakit') && inRange(a.tanggal)).length;
    const alpha = absensiList.filter(a => a.karyawanId === k.id && a.status === 'Alpha' && inRange(a.tanggal)).length;
    const total = hadir + izinSakit + alpha;
    const persen = total ? Math.round(hadir / total * 100) : 0;
    return { k, hadir, izinSakit, alpha, persen, total };
  });

  const tabStyle = (t) => t === pt
    ? 'padding:8px 16px;border-radius:20px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#0D0F14;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:inherit'
    : 'padding:8px 16px;border-radius:20px;background:var(--bg-elevated);color:var(--text-secondary);font-size:13px;font-weight:600;border:1px solid var(--border);cursor:pointer;font-family:inherit';

  // Period input HTML
  let periodeInput = '';
  if (pt === 'harian') {
    periodeInput = `<input type="date" value="${pv}" onchange="renderLaporan('harian',this.value)"
      style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;color:var(--primary);font-size:13px;font-weight:700;padding:7px 12px;outline:none;font-family:inherit;cursor:pointer">`;
  } else if (pt === 'mingguan') {
    periodeInput = `<input type="date" value="${pv}" onchange="renderLaporan('mingguan',this.value)"
      style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;color:var(--primary);font-size:13px;font-weight:700;padding:7px 12px;outline:none;font-family:inherit;cursor:pointer">
      <span style="font-size:12px;color:var(--text-muted)">s/d ${dateTo}</span>`;
  } else {
    periodeInput = `<input type="month" value="${pv}" onchange="renderLaporan('bulanan',this.value)"
      style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;color:var(--primary);font-size:13px;font-weight:700;padding:7px 12px;outline:none;font-family:inherit;cursor:pointer">`;
  }

  const totalHadir = rows.reduce((s,r)=>s+r.hadir,0);
  const totalAlpha = rows.reduce((s,r)=>s+r.alpha,0);
  const totalIzin  = rows.reduce((s,r)=>s+r.izinSakit,0);

  document.getElementById('page-laporan').innerHTML = `
    <div class="page-header"><h1>Laporan Kehadiran</h1><p>Rekap kehadiran ${currentUser.role === 'leader' ? 'tim' : 'seluruh karyawan'}</p></div>

    <!-- Periode tabs -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-body" style="padding:14px 16px">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <div style="display:flex;gap:6px">
            <button style="${tabStyle('harian')}" onclick="renderLaporan('harian')">📅 Harian</button>
            <button style="${tabStyle('mingguan')}" onclick="renderLaporan('mingguan')">📆 Mingguan</button>
            <button style="${tabStyle('bulanan')}" onclick="renderLaporan('bulanan')">🗓️ Bulanan</button>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">${periodeInput}</div>
        </div>
      </div>
    </div>

    <!-- Summary stats -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">
      <div style="background:var(--green-bg);border:1px solid rgba(34,197,94,0.2);border-radius:12px;padding:12px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:var(--green)">${totalHadir}</div>
        <div style="font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase">Total Hadir</div>
      </div>
      <div style="background:var(--yellow-bg);border:1px solid rgba(245,158,11,0.2);border-radius:12px;padding:12px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:var(--yellow)">${totalIzin}</div>
        <div style="font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase">Izin/Sakit</div>
      </div>
      <div style="background:var(--red-bg);border:1px solid rgba(239,68,68,0.2);border-radius:12px;padding:12px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:var(--red)">${totalAlpha}</div>
        <div style="font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase">Alpha</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-header-title">📊 Rekap Kehadiran — ${pt==='harian'?pv:pt==='mingguan'?dateFrom+' s/d '+dateTo:pv}</div>
        <button class="btn btn-secondary btn-sm" onclick="eksporLaporan('${pt}','${dateFrom}','${dateTo}')">📥 Ekspor Excel</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Nama</th><th>Dept</th><th>Shift</th><th>Hadir</th><th>Izin/Sakit</th><th>Alpha</th><th>% Hadir</th></tr></thead>
          <tbody>
            ${rows.length ? rows.map(r => `
              <tr>
                <td><strong>${r.k.nama}</strong></td>
                <td>${r.k.departemen||'-'}</td>
                <td><span class="badge badge-info" style="font-size:10px">${r.k.shift||'-'}</span></td>
                <td><span style="color:var(--green);font-weight:700">${r.hadir}</span></td>
                <td><span style="color:var(--yellow);font-weight:700">${r.izinSakit}</span></td>
                <td><span style="color:var(--red);font-weight:700">${r.alpha}</span></td>
                <td>
                  <div style="display:flex;align-items:center;gap:8px;min-width:80px">
                    <div class="progress" style="flex:1"><div class="progress-bar" style="width:${r.persen}%"></div></div>
                    <span style="font-size:12px;font-weight:700">${r.persen}%</span>
                  </div>
                </td>
              </tr>
            `).join('') : '<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:32px">Belum ada data untuk periode ini</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function eksporLaporan(pt, dateFrom, dateTo) {
  let target = currentUser.role === 'superadmin' ? karyawanList : getLeaderTeam();
  const inRange = (tgl) => tgl >= dateFrom && tgl <= dateTo;
  const data = [['NIK','Nama','Departemen','Shift','Hadir','Izin/Sakit','Alpha','% Hadir']];
  target.forEach(k => {
    const hadir = absensiList.filter(a => a.karyawanId === k.id && a.status === 'Hadir' && inRange(a.tanggal)).length;
    const izinSakit = absensiList.filter(a => a.karyawanId === k.id && (a.status === 'Izin' || a.status === 'Sakit') && inRange(a.tanggal)).length;
    const alpha = absensiList.filter(a => a.karyawanId === k.id && a.status === 'Alpha' && inRange(a.tanggal)).length;
    const total = hadir + izinSakit + alpha;
    const persen = total ? Math.round(hadir/total*100) : 0;
    data.push([k.nik, k.nama, k.departemen, k.shift||'-', hadir, izinSakit, alpha, `${persen}%`]);
  });
  const ws = XLSX.utils.aoa_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Laporan');
  XLSX.writeFile(wb, `laporan_${pt}_${dateFrom}.xlsx`);
  showToast('Laporan berhasil diunduh', 'success');
}

// ======================== IZIN ========================
function renderIzin() {
  const canApprove = currentUser.role === 'superadmin' || currentUser.role === 'leader';
  let izinFilter = [];
  if (currentUser.role === 'karyawan') izinFilter = izinList.filter(i => i.karyawanId === currentUser.id);
  else if (currentUser.role === 'leader') {
    const teamIds = getLeaderTeam().map(k => k.id);
    izinFilter = izinList.filter(i => teamIds.includes(i.karyawanId));
  } else izinFilter = izinList;

  izinFilter = [...izinFilter].sort((a,b) => b.id - a.id);

  const formHtml = currentUser.role === 'karyawan' ? `
    <div class="card">
      <div class="card-header"><div class="card-header-title">📝 Ajukan Izin</div></div>
      <div class="card-body">
        <div class="form-grid">
          <div class="form-group">
            <label>Jenis Izin</label>
            <select id="izinJenis">
              <option>Cuti</option><option>Sakit</option><option>Izin</option><option>Dinas Luar</option>
            </select>
          </div>
          <div class="form-group"></div>
          <div class="form-group">
            <label>Tanggal Mulai</label>
            <input type="date" id="izinMulai" min="${todayStr()}">
          </div>
          <div class="form-group">
            <label>Tanggal Selesai</label>
            <input type="date" id="izinSelesai" min="${todayStr()}">
          </div>
          <div class="form-group full">
            <label>Alasan</label>
            <textarea id="izinAlasan" placeholder="Tuliskan alasan izin..."></textarea>
          </div>
        </div>
        <button class="btn btn-primary" onclick="ajukanIzin()">📨 Kirim Permohonan</button>
      </div>
    </div>
  ` : '';

  const badgeMap = { pending: 'badge-warning', disetujui: 'badge-success', ditolak: 'badge-danger' };
  document.getElementById('page-izin').innerHTML = formHtml + `
    <div class="card">
      <div class="card-header">
        <div class="card-header-title">📝 Daftar Permohonan Izin</div>
        <span class="badge badge-warning">${izinFilter.filter(i=>i.status==='pending').length} pending</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Karyawan</th><th>Jenis</th><th>Tanggal</th><th>Status</th>${canApprove?'<th>Aksi</th>':''}</tr></thead>
          <tbody>
            ${izinFilter.length ? izinFilter.map(i => {
              const k = karyawanList.find(k => k.id === i.karyawanId);
              const action = (i.status === 'pending' && canApprove) ?
                `<td><div class="btn-group"><button class="btn btn-success btn-sm" onclick="approveIzin(${i.id},true)">✅ Setuju</button><button class="btn btn-danger btn-sm" onclick="approveIzin(${i.id},false)">❌ Tolak</button></div></td>` : (canApprove ? '<td>-</td>' : '');
              return `<tr><td><strong>${k?.nama||'-'}</strong></td><td>${i.jenis}</td><td style="font-size:12px">${i.tglMulai}${i.tglSelesai&&i.tglSelesai!==i.tglMulai?' → '+i.tglSelesai:''}</td><td><span class="badge ${badgeMap[i.status]||''}">${i.status}</span></td>${action}</tr>`;
            }).join('') : '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:32px">Tidak ada permohonan izin</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

async function ajukanIzin() {
  const jenis = document.getElementById('izinJenis').value;
  const mulai = document.getElementById('izinMulai').value;
  const selesai = document.getElementById('izinSelesai').value;
  const alasan = document.getElementById('izinAlasan').value;
  if (!mulai) return showToast('Pilih tanggal mulai', 'error');
  if (selesai && selesai < mulai) return showToast('Tanggal selesai tidak valid', 'error');
  const newIzin = { id: Date.now(), karyawanId: currentUser.id, jenis, tglMulai: mulai, tglSelesai: selesai||mulai, alasan, status: 'pending' };
  izinList.push(newIzin);
  try { await dbUpsertIzin(newIzin); } catch(e) { showToast('Gagal kirim: '+e.message, 'error'); return; }
  showToast('Permohonan izin terkirim', 'success'); renderIzin();
}

async function approveIzin(id, setuju) {
  const i = izinList.find(i => i.id === id);
  if (i) {
    i.status = setuju ? 'disetujui' : 'ditolak';
    try { await dbUpdateIzinStatus(id, i.status); } catch(e) { showToast('Gagal update: '+e.message, 'error'); return; }
    renderIzin();
    showToast(setuju ? 'Izin disetujui' : 'Izin ditolak', setuju ? 'success' : 'error');
  }
}

// ======================== SHIFT ========================
function renderShift() {
  if (currentUser.role !== 'superadmin') return;

  // Hitung berapa karyawan pakai setiap shift
  function penggunaShift(namaShift) {
    return karyawanList.filter(k => k.shift === namaShift);
  }

  const rows = shiftList.map((s, idx) => {
    const pengguna = penggunaShift(s.nama);
    const terpakai = pengguna.length > 0;
    return `
      <div class="shift-item" style="flex-wrap:wrap;gap:10px">
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;display:flex;align-items:center;gap:8px">
            ${s.nama}
            ${terpakai
              ? `<span class="badge badge-success" style="font-size:10px">${pengguna.length} karyawan</span>`
              : `<span class="badge badge-danger" style="font-size:10px">Tidak terpakai</span>`
            }
          </div>
          <div class="shift-time">⏰ ${s.masuk} – ${s.pulang}</div>
          ${terpakai ? `<div style="font-size:11px;color:var(--text-muted);margin-top:3px">${pengguna.slice(0,3).map(k=>k.nama).join(', ')}${pengguna.length>3?' +lainnya':''}</div>` : ''}
        </div>
        <div class="btn-group">
          <button class="btn btn-secondary btn-sm" onclick="editShift(${idx})">✏️ Edit</button>
          <button class="btn btn-danger btn-sm" onclick="hapusShift(${idx})"
            ${terpakai ? 'style="opacity:0.45;cursor:not-allowed" title="Shift masih digunakan '+pengguna.length+' karyawan"' : 'title="Hapus shift"'}>
            🗑️ Hapus
          </button>
        </div>
      </div>
    `;
  }).join('');

  // Shift tidak terpakai
  const tidakTerpakai = shiftList.filter(s => penggunaShift(s.nama).length === 0);

  document.getElementById('page-shift').innerHTML = `
    <div class="page-header"><h1>Shift Kerja</h1><p>${shiftList.length} shift terdaftar</p></div>

    ${tidakTerpakai.length ? `
    <div style="background:var(--red-bg);border:1px solid rgba(239,68,68,0.25);border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:8px;font-size:13px">
        <span style="font-size:18px">⚠️</span>
        <span><strong style="color:var(--red)">${tidakTerpakai.length} shift tidak terpakai:</strong>
        <span style="color:var(--text-muted)"> ${tidakTerpakai.map(s=>s.nama).join(', ')}</span></span>
      </div>
      <button class="btn btn-danger btn-sm" onclick="hapusSemuaTidakTerpakai()">🗑️ Hapus Semua</button>
    </div>` : ''}

    <div class="card">
      <div class="card-header">
        <div class="card-header-title">⏰ Daftar Shift</div>
        <button class="btn btn-primary btn-sm" onclick="tambahShift()">+ Tambah</button>
      </div>
      <div class="card-body">${rows || '<div class="empty-state"><div class="empty-icon">⏰</div><p>Belum ada shift</p></div>'}</div>
    </div>
  `;
}

function hapusShift(idx) {
  const s = shiftList[idx];
  const pengguna = karyawanList.filter(k => k.shift === s.nama);
  if (pengguna.length > 0) {
    return showToast(`Shift "${s.nama}" masih digunakan ${pengguna.length} karyawan`, 'error');
  }
  showConfirm(`Shift "${s.nama}" akan dihapus permanen.`, 'Hapus Shift', '🗑️', 'Ya, Hapus').then(async ok => {
    if (!ok) return;
    try { await dbDeleteShiftByIdx(idx); } catch(e) { showToast('Gagal hapus: '+e.message, 'error'); return; }
    shiftList.splice(idx, 1);
    renderShift();
    showToast(`Shift "${s.nama}" dihapus`, 'success');
  });
}

function hapusSemuaTidakTerpakai() {
  const tidakTerpakai = shiftList.filter(s => karyawanList.filter(k => k.shift === s.nama).length === 0);
  if (!tidakTerpakai.length) return showToast('Tidak ada shift yang bisa dihapus', 'info');
  showConfirm(`${tidakTerpakai.length} shift akan dihapus: ${tidakTerpakai.map(s=>s.nama).join(', ')}`, 'Hapus Shift Tidak Terpakai', '🗑️', 'Ya, Hapus Semua').then(async ok => {
    if (!ok) return;
    try {
      await Promise.all(tidakTerpakai.map(s => {
        const idx = shiftList.indexOf(s);
        return idx >= 0 ? dbDeleteShiftByIdx(idx) : Promise.resolve();
      }));
    } catch(e) { showToast('Gagal hapus: '+e.message, 'error'); return; }
    shiftList = shiftList.filter(s => karyawanList.filter(k => k.shift === s.nama).length > 0);
    renderShift();
    showToast(`${tidakTerpakai.length} shift dihapus`, 'success');
  });
}

// ======================== EXCEL ========================
function downloadTemplate() {
  const headers = ["NIK", "NAMA KARYAWAN", "DEPARTEMEN", "JABATAN", "SHIFT", "EMAIL"];
  const sample = [
    ["SPR001","Contoh Karyawan","Produksi","Operator","Reguler","karyawan@spr.com"],
    ["SPR002","Contoh Leader","Produksi","Leader Produksi","Reguler","leader@spr.com"],
    ["SPR003","HRD Staff","HRD","Staff HRD","Reguler","hrdstaff@spr.com"]
  ];
  const ws = XLSX.utils.aoa_to_sheet([headers, ...sample]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Template");
  XLSX.writeFile(wb, "template_karyawan_SPR.xlsx");
  showToast('Template diunduh', 'success');
}

function importExcel(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
      if (rows.length < 2) return showToast('File kosong', 'error');
      const h = rows[0].map(v => v?.toString().toUpperCase() || '');
      const idx = (key) => h.findIndex(v => v.includes(key));
      const iNik=idx('NIK'), iNama=idx('NAMA'), iDept=idx('DEPARTEMEN'), iJab=idx('JABATAN'), iShift=idx('SHIFT'), iEmail=idx('EMAIL');
      if (iNama < 0) return showToast('Kolom NAMA tidak ditemukan', 'error');
      const newK = [];
      for (let i = 1; i < rows.length; i++) {
        const r = rows[i];
        if (!r[iNama]) continue;
        const nik = r[iNik]?.toString().trim() || `EMP${Date.now()+i}`;
        const nama = r[iNama].toString().trim();
        const dept = r[iDept]?.toString().trim() || 'Umum';
        const jab = r[iJab]?.toString().trim() || 'Staff';
        const shiftInput = r[iShift]?.toString().trim() || 'Reguler';
        const shiftObj = shiftList.find(s => s.nama.toLowerCase() === shiftInput.toLowerCase()) || { nama: 'Reguler' };
        const email = r[iEmail]?.toString().trim() || `${nik.toLowerCase()}@spr.com`;
        let role = 'karyawan';
        if (jab.toLowerCase().includes('hrd') || jab.toLowerCase().includes('hr')) role = 'superadmin';
        else if (jab.toLowerCase().includes('leader') || jab.toLowerCase().includes('kepala') || jab.toLowerCase().includes('supervisor')) role = 'leader';
        newK.push({ id: Date.now()+i, nik, nama, departemen: dept, jabatan: jab, shift: shiftObj.nama, email, role, password: '123' });
      }
      if (!newK.length) return showToast('Tidak ada data valid', 'error');
      karyawanList = newK;
      if (!karyawanList.some(k => k.role === 'superadmin')) {
        karyawanList.unshift({ id: 1, nik: "HRD001", nama: "Admin HRD", departemen: "HRD", jabatan: "HRD Manager", shift: "Reguler", email: "hrd@spr.com", role: "superadmin", password: "123" });
      }
      showLoading('Menyimpan ke database...');
      try {
        await Promise.all(karyawanList.map(k => dbUpsertKaryawan(k)));
      } catch(e) { hideLoading(); showToast('Sebagian data gagal disimpan: '+e.message, 'error'); return; }
      hideLoading();
      showToast(`✅ ${newK.length} karyawan berhasil diimport`, 'success');
      renderAllUI();
    } catch(err) { showToast('Gagal membaca file Excel', 'error'); console.error(err); }
    document.getElementById('excelInput').value = '';
  };
  reader.readAsArrayBuffer(file);
}

async function simpanAkses(id) {
  const k = karyawanList.find(k => k.id === id);
  if (!k) return;
  const newRole = document.getElementById('aksesRole').value;
  const newPass = document.getElementById('aksesPassword').value.trim();

  // Protect last superadmin
  if (k.role === 'superadmin' && newRole !== 'superadmin' && karyawanList.filter(k => k.role === 'superadmin').length <= 1) {
    return showToast('Tidak dapat mengubah role satu-satunya HRD', 'error');
  }

  k.role = newRole;
  if (newPass) k.password = newPass;

  try { await dbUpsertKaryawan(k); } catch(e) { showToast('Gagal simpan: '+e.message, 'error'); return; }
  closeAksesModal();
  renderAkses();
  showToast(`✅ Akses ${k.nama} berhasil diperbarui`, 'success');

  // Refresh nav if current user's role changed
  if (id === currentUser.id) {
    currentUser.role = newRole;
    renderAllUI();
  }
}

// ======================== CUSTOM CONFIRM (GAS COMPATIBLE) ========================
let _confirmResolve = null;

function showConfirm(msg, title, icon, okLabel, okStyle) {
  return new Promise(resolve => {
    _confirmResolve = resolve;
    document.getElementById('confirmMsg').textContent = msg;
    document.getElementById('confirmTitle').textContent = title || 'Konfirmasi';
    document.getElementById('confirmIcon').textContent = icon || '⚠️';
    document.getElementById('confirmOkBtn').textContent = okLabel || 'Hapus';
    if (okStyle) document.getElementById('confirmOkBtn').style.cssText += ';' + okStyle;
    const overlay = document.getElementById('confirmOverlay');
    overlay.style.display = 'flex';
  });
}

function resolveConfirm(result) {
  document.getElementById('confirmOverlay').style.display = 'none';
  if (_confirmResolve) { _confirmResolve(result); _confirmResolve = null; }
}
